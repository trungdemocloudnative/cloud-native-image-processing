# Deploy CNIP to Azure AKS from the devops README flow (build/push images + Helm upgrade).
#
# GitHub Environments (different secrets/variables per tier) — branch picks the environment name (no repo variable for this):
#   main    → Production
#   develop → Staging
#   other   → Development
# Create those exact names under Settings → Environments. Put **environment secrets** and **environment variables** on each
# (repository-level secrets/vars are only fallbacks when an environment has no value for a name).
#
# OIDC: federated credential on your app registration must allow the ref that runs the job (e.g. `refs/heads/main`, `refs/heads/develop`).
#
# Prerequisites (README §1): Azure AD app with AcrPush + AKS get-credentials access; populate **environment** secrets from Terraform output.
#
# Typical environment secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, ACR_NAME, CNIP_ACR_LOGIN_SERVER,
# CNIP_PUBLIC_APP_URL, AKS_RESOURCE_GROUP, AKS_CLUSTER_NAME, KEY_VAULT_NAME, WORKLOAD_IDENTITY_CLIENT_ID.
# Typical environment variables: K8S_NAMESPACE (optional, default cnip), HELM_APPLICATION_INSIGHTS_ENABLED (optional),
# FRONTEND_IMAGES_REFRESH_INTERVAL_SECONDS (optional, default 5).
# Optional mode: set environment variable USE_TERRAFORM_OUTPUTS=true to read deploy values from Terraform remote state outputs
# (requires TF_STATE_* secrets and TERRAFORM_USE_REMOTE_STATE=true on that environment).
#
# Infrastructure: use `terraform-manual.yml` (same branch → environment mapping).

name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag for ACR (default = short SHA)"
        required: false
        type: string
      skip_build:
        description: "If true, only run Helm upgrade (images must already exist in ACR)"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  HELM_RELEASE_NAME: cnip
  HELM_CHART_PATH: ./devops/helm/cloud-native-image-processing
  HELM_VALUES_FILE: ./devops/helm/cloud-native-image-processing/values.yaml
  # Branch-only routing (must match environment.name below — GitHub does not allow env.* in jobs.*.environment.name).
  TARGET_GITHUB_ENVIRONMENT: ${{ github.ref_name == 'main' && 'Production' || (github.ref_name == 'develop' && 'Staging' || 'Development') }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'Production' || (github.ref_name == 'develop' && 'Staging' || 'Development') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deployment context
        run: |
          echo "target_github_environment=${TARGET_GITHUB_ENVIRONMENT}"
          echo "github_ref_name=${{ github.ref_name }}"
          echo "github_repository=${{ github.repository }}"
          echo "github_ref=${{ github.ref }}"
          echo "github_sha=${{ github.sha }}"
          echo "github_event_name=${{ github.event_name }}"
          echo "github_actor=${{ github.actor }}"
          echo "github_run_id=${{ github.run_id }}"
          echo "github_run_attempt=${{ github.run_attempt }}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform (read outputs)
        if: ${{ vars.USE_TERRAFORM_OUTPUTS == 'true' }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0
          terraform_wrapper: false

      - name: Resolve deploy values from Terraform outputs
        if: ${{ vars.USE_TERRAFORM_OUTPUTS == 'true' }}
        env:
          TF_STATE_RG: ${{ secrets.TF_STATE_RESOURCE_GROUP }}
          TF_STATE_SA: ${{ secrets.TF_STATE_STORAGE_ACCOUNT }}
          TF_STATE_CONTAINER: ${{ secrets.TF_STATE_CONTAINER }}
          TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
        run: |
          set -euo pipefail
          tf_output_raw() {
            terraform -chdir=devops/terraform output -raw "$1" 2>/dev/null || true
          }
          first_valid_http_url() {
            for candidate in "$@"; do
              if [[ "$candidate" =~ ^https?://[^[:space:]]+$ ]]; then
                printf '%s\n' "$candidate"
                return 0
              fi
            done
            return 1
          }
          [ "${{ vars.TERRAFORM_USE_REMOTE_STATE }}" = "true" ] || { echo "Set TERRAFORM_USE_REMOTE_STATE=true for this environment."; exit 1; }
          test -n "${TF_STATE_RG}" || { echo "Missing TF_STATE_RESOURCE_GROUP secret"; exit 1; }
          test -n "${TF_STATE_SA}" || { echo "Missing TF_STATE_STORAGE_ACCOUNT secret"; exit 1; }
          test -n "${TF_STATE_CONTAINER}" || { echo "Missing TF_STATE_CONTAINER secret"; exit 1; }
          test -n "${TF_STATE_KEY}" || { echo "Missing TF_STATE_KEY secret"; exit 1; }
          cat > devops/terraform/backend.ci.tf <<'EOF'
          terraform {
            backend "azurerm" {}
          }
          EOF
          terraform -chdir=devops/terraform init -input=false -no-color \
            -backend-config="resource_group_name=${TF_STATE_RG}" \
            -backend-config="storage_account_name=${TF_STATE_SA}" \
            -backend-config="container_name=${TF_STATE_CONTAINER}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}"
          ACR_NAME="$(tf_output_raw acr_name)"
          CNIP_ACR_LOGIN_SERVER="$(tf_output_raw acr_login_server)"
          AKS_RESOURCE_GROUP="$(tf_output_raw resource_group_name)"
          AKS_CLUSTER_NAME="$(tf_output_raw aks_name)"
          KEY_VAULT_NAME="$(tf_output_raw key_vault_name)"
          WORKLOAD_IDENTITY_CLIENT_ID="$(tf_output_raw workload_identity_client_id)"
          CNIP_PUBLIC_APP_URL="$(
            first_valid_http_url \
              "$(tf_output_raw cdn_frontdoor_endpoint_url)" \
              "$(tf_output_raw ingress_test_http_url)" \
              "$(tf_output_raw cnip_public_app_url_http_ip)" \
            || true
          )"
          CNIP_PUBLIC_APP_URL="${CNIP_PUBLIC_APP_URL:-http://localhost:8080}"
          {
            echo "ACR_NAME=${ACR_NAME}"
            echo "CNIP_ACR_LOGIN_SERVER=${CNIP_ACR_LOGIN_SERVER}"
            echo "AKS_RESOURCE_GROUP=${AKS_RESOURCE_GROUP}"
            echo "AKS_CLUSTER_NAME=${AKS_CLUSTER_NAME}"
            echo "KEY_VAULT_NAME=${KEY_VAULT_NAME}"
            echo "WORKLOAD_IDENTITY_CLIENT_ID=${WORKLOAD_IDENTITY_CLIENT_ID}"
            echo "CNIP_PUBLIC_APP_URL=${CNIP_PUBLIC_APP_URL}"
          } >> "${GITHUB_ENV}"

      - name: ACR login
        run: az acr login -n "${ACR_NAME:-${{ secrets.ACR_NAME }}}"

      - name: Build and push images
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_build == true) }}
        env:
          CNIP_ACR_LOGIN_SERVER: ${{ env.CNIP_ACR_LOGIN_SERVER || secrets.CNIP_ACR_LOGIN_SERVER }}
          CNIP_PUBLIC_APP_URL: ${{ env.CNIP_PUBLIC_APP_URL || secrets.CNIP_PUBLIC_APP_URL }}
          CNIP_FRONTEND_IMAGES_REFRESH_INTERVAL_SECONDS: ${{ vars.FRONTEND_IMAGES_REFRESH_INTERVAL_SECONDS || '5' }}
          CNIP_IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          docker compose build api image-processing-worker ai-generation-worker frontend
          docker compose push api image-processing-worker ai-generation-worker frontend

      - name: Configure kubectl for AKS (Helm)
        run: |
          az aks get-credentials \
            --resource-group "${AKS_RESOURCE_GROUP:-${{ secrets.AKS_RESOURCE_GROUP }}}" \
            --name "${AKS_CLUSTER_NAME:-${{ secrets.AKS_CLUSTER_NAME }}}" \
            --overwrite-existing

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Helm upgrade (Key Vault + ACR + workload identity)
        env:
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'cnip' }}
          CNIP_IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          NS="${K8S_NAMESPACE:-cnip}"
          if [ "${{ vars.HELM_APPLICATION_INSIGHTS_ENABLED }}" = "false" ]; then
            AI_ENABLED=false
          else
            AI_ENABLED=true
          fi
          FRONTEND_REFRESH_INTERVAL="${{ vars.FRONTEND_IMAGES_REFRESH_INTERVAL_SECONDS || '5' }}"
          helm upgrade --install "${{ env.HELM_RELEASE_NAME }}" "${{ env.HELM_CHART_PATH }}" \
            --namespace "$NS" \
            --create-namespace \
            -f "${{ env.HELM_VALUES_FILE }}" \
            --wait --timeout 10m \
            --set-string api.image.tag="${CNIP_IMAGE_TAG}" \
            --set-string worker.image.tag="${CNIP_IMAGE_TAG}" \
            --set-string aiWorker.image.tag="${CNIP_IMAGE_TAG}" \
            --set-string frontend.image.tag="${CNIP_IMAGE_TAG}" \
            --set keyVault.enabled=true \
            --set applicationInsights.enabled="${AI_ENABLED}" \
            --set-string frontend.imagesRefreshIntervalSeconds="${FRONTEND_REFRESH_INTERVAL}" \
            --set-string acrLoginServer="${CNIP_ACR_LOGIN_SERVER:-${{ secrets.CNIP_ACR_LOGIN_SERVER }}}" \
            --set-string keyVault.tenantId="${{ secrets.AZURE_TENANT_ID }}" \
            --set-string keyVault.vaultName="${KEY_VAULT_NAME:-${{ secrets.KEY_VAULT_NAME }}}" \
            --set-string keyVault.workloadIdentityClientId="${WORKLOAD_IDENTITY_CLIENT_ID:-${{ secrets.WORKLOAD_IDENTITY_CLIENT_ID }}}"
