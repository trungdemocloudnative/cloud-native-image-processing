{{- if .Values.keyVault.enabled }}
{{- $_ := required "keyVault.tenantId is required when keyVault.enabled" .Values.keyVault.tenantId }}
{{- $_ := required "keyVault.vaultName is required when keyVault.enabled" .Values.keyVault.vaultName }}
{{- $_ := required "keyVault.workloadIdentityClientId is required when keyVault.enabled" .Values.keyVault.workloadIdentityClientId }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.keyVault.secretProviderClassName }}
  labels:
    {{- include "cnip.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.keyVault.workloadIdentityClientId | quote }}
    keyvaultName: {{ .Values.keyVault.vaultName | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: postgres-connection-string
          objectType: secret
        - |
          objectName: blob-storage-connection-string
          objectType: secret
        - |
          objectName: eventhub-connection-string-image-processing
          objectType: secret
        - |
          objectName: eventhub-connection-string-ai-description
          objectType: secret
        - |
          objectName: redis-connection-string
          objectType: secret
        - |
          objectName: computer-vision-endpoint
          objectType: secret
        - |
          objectName: computer-vision-api-key
          objectType: secret
  secretObjects:
    - secretName: {{ .Values.secrets.existingSecretName | quote }}
      type: Opaque
      data:
        - objectName: postgres-connection-string
          key: ConnectionStrings__Postgres
        - objectName: blob-storage-connection-string
          key: BlobStorage__ConnectionString
        - objectName: eventhub-connection-string-image-processing
          key: EventHubs__ImageProcessingConnectionString
        - objectName: eventhub-connection-string-ai-description
          key: EventHubs__AiDescriptionConnectionString
        - objectName: redis-connection-string
          key: Redis__ConnectionString
        - objectName: computer-vision-endpoint
          key: ComputerVision__Endpoint
        - objectName: computer-vision-api-key
          key: ComputerVision__ApiKey
{{- end }}
