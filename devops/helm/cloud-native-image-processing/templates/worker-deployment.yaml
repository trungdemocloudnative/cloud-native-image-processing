{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cnip.fullname" . }}-worker
  labels:
    app.kubernetes.io/component: worker
    {{- include "cnip.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- if .Values.keyVault.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      {{- if .Values.keyVault.enabled }}
      serviceAccountName: {{ .Values.keyVault.serviceAccountName }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.keyVault.enabled }}
      initContainers:
        {{- include "cnip.keyVault.initContainers" . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "cnip.workerImage" . }}
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "cnip.configMapName" . }}
            - secretRef:
                name: {{ .Values.secrets.existingSecretName }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          {{- if .Values.keyVault.enabled }}
          volumeMounts:
            {{- include "cnip.keyVault.volumeMounts" . | nindent 12 }}
          {{- end }}
      {{- if .Values.keyVault.enabled }}
      volumes:
        {{- include "cnip.keyVault.volumes" . | nindent 8 }}
      {{- end }}
{{- end }}
