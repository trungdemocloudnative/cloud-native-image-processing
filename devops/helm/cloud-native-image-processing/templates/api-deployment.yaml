{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cnip.fullname" . }}-api
  labels:
    app.kubernetes.io/component: api
    {{- include "cnip.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- if .Values.keyVault.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      {{- if .Values.keyVault.enabled }}
      serviceAccountName: {{ .Values.keyVault.serviceAccountName }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.keyVault.enabled }}
      initContainers:
        {{- include "cnip.keyVault.initContainers" . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "cnip.apiImage" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "cnip.configMapName" . }}
            - secretRef:
                name: {{ .Values.secrets.existingSecretName }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          {{- if .Values.keyVault.enabled }}
          volumeMounts:
            {{- include "cnip.keyVault.volumeMounts" . | nindent 12 }}
          {{- end }}
      {{- if .Values.keyVault.enabled }}
      volumes:
        {{- include "cnip.keyVault.volumes" . | nindent 8 }}
      {{- end }}
{{- end }}
