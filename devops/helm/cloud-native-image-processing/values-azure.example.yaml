# Azure overlay — copy to values-azure.yaml, replace placeholders, then:
#   helm upgrade --install cnip ./devops/helm/cloud-native-image-processing -n cnip \
#     --create-namespace \
#     -f values.yaml -f values-azure.yaml \
#     --set-string acrLoginServer="$(terraform -chdir=devops/terraform output -raw acr_login_server)"
#
# Prerequisites on AKS:
#   - ingress-nginx (chart defaults to class nginx), or override ingress.className.
#   - Terraform applied (AKS OIDC + workload identity + Key Vault Secrets Provider add-on).
#
# Key Vault (required for this overlay): either set the three IDs below from Terraform output,
# or leave them empty and pass helm --set-string keyVault.tenantId=... vaultName=... workloadIdentityClientId=...
# (see devops/README.md). Helm fails template render if keyVault.enabled is true and all sources still leave any empty.
#
#   terraform -chdir=devops/terraform output -raw azure_tenant_id
#   terraform -chdir=devops/terraform output -raw key_vault_name
#   terraform -chdir=devops/terraform output -raw workload_identity_client_id
#
# imagePullSecrets: leave empty when AKS kubelet AcrPull on this ACR is enough; add acr-pull if you use a private pull secret.
#
# Image pulls: short repository names below; pass ACR host on the helm command line (--set-string acrLoginServer=...) or set acrLoginServer in this file.

imagePullSecrets: []

keyVault:
  enabled: true
  tenantId: ""
  vaultName: ""
  workloadIdentityClientId: ""
  secretProviderClassName: cnip-akv
  serviceAccountName: cnip-workload

config:
  cors:
    allowedOrigins:
      # Include every browser origin you use: custom host, Azure cloudapp hostname, and raw LB IP (no trailing slash).
      - "https://YOUR_APP_HOST"
      - "http://YOUR_APP_HOST"
      - "http://YOUR_LB_IP"
      - "http://YOUR_INGRESS_DNS_LABEL.REGION.cloudapp.azure.com"

api:
  image:
    repository: cloud-native-image-processing-api
    tag: "1.0.3-cnip"

worker:
  image:
    repository: cloud-native-image-processing-worker
    tag: "1.0.3-cnip"

aiWorker:
  image:
    repository: cloud-native-image-processing-aiworker
    tag: "1.0.3-cnip"

frontend:
  image:
    repository: cloud-native-image-processing-frontend
    tag: "1.0.3-cnip"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "12m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
  hosts:
    - host: YOUR_APP_HOST
      paths:
        - path: /api
          pathType: Prefix
          service: api
        - path: /
          pathType: Prefix
          service: frontend
    # Catch-all: matches http://<PUBLIC_LB_IP>/ and any Host header (same as values.yaml).
    - host: ""
      paths:
        - path: /api
          pathType: Prefix
          service: api
        - path: /
          pathType: Prefix
          service: frontend
