# Infrastructure for local dev: Postgres, Redis, Azurite (blob), Azure Event Hubs emulator.
# API on the host: use appsettings.Development.json (localhost + ports below).
#   docker compose -f docker-compose-infra.yml up -d
#
# Event Hubs emulator:
# https://learn.microsoft.com/en-us/azure/event-hubs/overview-emulator
# https://github.com/Azure/azure-event-hubs-emulator-installer
services:
  postgres:
    image: postgres:16.4-alpine
    container_name: cnip-postgres
    environment:
      POSTGRES_DB: cloud_native_image_processing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloud_native_image_processing"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - cnip-infra

  redis:
    image: redis:7.4-alpine
    container_name: cnip-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - cnip-infra

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    container_name: cnip-azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --debug /data/debug.log
    restart: unless-stopped
    networks:
      cnip-infra:
        aliases:
          - azurite

  eventhubs-emulator:
    image: mcr.microsoft.com/azure-messaging/eventhubs-emulator:2.2.0
    container_name: cnip-eventhubs-emulator
    depends_on:
      - azurite
    ports:
      - "5672:5672"
      - "9092:9092"
      - "5300:5300"
    environment:
      BLOB_SERVER: azurite
      METADATA_SERVER: azurite
      ACCEPT_EULA: "Y"
    volumes:
      - ./infra/eventhubs-emulator/Config.json:/Eventhubs_Emulator/ConfigFiles/Config.json:ro
    restart: unless-stopped
    networks:
      cnip-infra:
        aliases:
          - eventhubs-emulator

networks:
  cnip-infra:
    driver: bridge

volumes:
  postgres_data:
  azurite_data:
